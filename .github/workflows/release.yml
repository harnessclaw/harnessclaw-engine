name: Build Cross-Platform Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - goos: linux
            goarch: amd64
            suffix: ""
            runtime: true
          - goos: linux
            goarch: arm64
            suffix: ""
            runtime: true
          # macOS
          - goos: darwin
            goarch: amd64
            suffix: ""
            runtime: true
          - goos: darwin
            goarch: arm64
            suffix: ""
            runtime: true
          # Windows
          - goos: windows
            goarch: amd64
            suffix: ".exe"
            runtime: true
          - goos: windows
            goarch: arm64
            suffix: ".exe"
            runtime: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" \
            -o dist/harnessclaw-engine-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }} \
            ./cmd/server

      - name: Build runtime bundle
        if: matrix.runtime
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node build/prepare-runtime.cjs --platform "${{ matrix.goos }}" --arch "${{ matrix.goarch }}" --include-engine --archive-dir dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: harnessclaw-engine-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/harnessclaw-engine-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the tag name (e.g., v0.0.3 → 0.0.3)
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract the section between ## [TAG] and the next ## [
          NOTES=$(awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          # Write to file to preserve multiline content
          echo "$NOTES" > release_notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          prerelease: ${{ contains(github.ref_name, '-beta') }}
          make_latest: ${{ contains(github.ref_name, '-beta') && 'false' || 'true' }}
          files: artifacts/*
