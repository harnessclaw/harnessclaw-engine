  # ---------------------------------------------------------------------------
  # 多 Providers 失败降级 (fallback_chain) — 取消注释启用
  # ---------------------------------------------------------------------------
  # 思路：在 providers 下声明多个 provider；用 fallback_chain 给一个优先级队列。
  # 请求先打主 (chain[0])；遇到可降级错误 (429/5xx/529/网络抖动/连续 529 触发的
  # fallback 信号 / 网关首字节超时 / 401/403) 时，trip 该 provider 并 routes 到
  # 下一个。冷却到期后下一次请求把 tripped provider 作为探活 (Probe budget=5s)；
  # 探活成功 → 恢复并重新作为主；失败 → 冷却指数翻倍。
  #
  # 不会触发降级的错误：prompt_too_long / max_output_tokens (payload 问题，换
  # provider 也会失败) 以及 ctx.Canceled / DeadlineExceeded (调用方主动取消)。
  #
  # 当 fallback_chain 为空或只有 1 项时，跳过 Failover 直接走单 provider 路径，
  # 行为与现有部署完全一致。
  #
  # fallback_chain 里的名字必须对应 providers 下的 yaml key (不是 type)。
  # 顺序即优先级：chain[0] = 主。
  #
  # 示例：
  # fallback_chain:
  #   - claude-46     # 主：最新 Claude
  #   - claude-45     # 备 1：上一代 Claude
  #   - openai        # 备 2：OpenAI
  #   - deepseek      # 备 3
  #   - kimi          # 备 4
  #   - glm           # 备 5

  # ---------------------------------------------------------------------------
  # Health：Failover 健康检查与降级行为调优 (全部可省略，用默认值)
  # ---------------------------------------------------------------------------
  # health:
  #   # 冷却调度 (per-provider 状态机)
  #   cooldown_base:    "30s"     # 首次 trip 的冷却
  #   cooldown_max:     "10m"     # 冷却上限
  #   cooldown_factor:  2          # 连续 trip 的冷却倍率
  #
  #   # 单次 provider 调用的墙钟预算
  #   primary_budget:        "15s"  # Fast — 主 healthy 时 (有备可切，激进快切)
  #   last_healthy_budget:   "30s"  # Medium — 最后一个 healthy 或 Tier 3 兜底
  #   probe_budget:          "5s"   # Probe — 探活 (冷却已过的 trip provider)
  #
  # 设计要点：
  #   - "主 budget 15s" 不是说主只能等 15s 完成响应，而是 Failover 层面给主的
  #     调用上限——超过 15s 视为失败、切到备。LLM 正常请求首字节 1-5s，15s
  #     给单次抖动留了余量；如果主总是慢，把 primary_budget 调到 30s 或更大。
  #   - 单 provider 部署 (fallback_chain 留空) 不走这套，等价于现有 retry 默认。
  #   - 健康状态全部通过真实请求驱动 (被动)；没有后台拨测，零额外 token。

# --- Query Engine ---
engine:
  max_turns: 50
  auto_compact_threshold: 0.8
  tool_timeout: "120s"

# --- Session ---
session:
  max_messages: 200
  idle_timeout: "30m"

# --- Channels ---
channels:
  websocket:
    enabled: true
    host: "0.0.0.0"
    port: 8081
    path: "/v1/ws"
    write_buffer: 256
    ping_interval: "30s"
    write_timeout: "10s"
    max_message_size: 524288   # 512KB
    # client_tools sets the DEFAULT routing for tools that don't opt in
    # to a specific side. Per-tool overrides (e.g. AskUserQuestion always
    # client, regardless of this flag) take precedence — see
    # internal/tool.ClientRoutedTool.
    #
    #   true  — delegate-everything mode (Claude Code CLI style: client
    #           runs Bash/Edit/Read/etc.). Pick this when your client
    #           knows how to execute every registered tool.
    #   false — server-runs-everything mode (web UI style: server has API
    #           keys for WebSearch, spawns sub-agents, etc.). The client
    #           still receives tool.call for tools marked client-routed
    #           (AskUserQuestion). This is the right setting for emma's
    #           web UI.
    client_tools: false
    # trace_frames toggles a per-outgoing-frame INFO log line capturing
    # type / card_kind / card_id / parent / seq / status / error. Off in
    # production (this flag generates one line per wire frame — 80-200
    # per plan run); flip on while debugging "step never closes" /
    # "card lineage wrong" UI issues, then grep "ws send" service.log.
    trace_frames: false
  http:
    enabled: true
    host: "0.0.0.0"
    port: 8080
    path: "/api/v1"
  feishu:
    enabled: false
    host: "0.0.0.0"
    port: 8082
    # app_id: ""
    # app_secret: ""

# --- Tools ---
tools:
  bash:
    enabled: true
    timeout: "60s"
    sandbox: false
  file_read:
    enabled: true
  file_edit:
    enabled: true
  file_write:
    enabled: true
  grep:
    enabled: true
  glob:
    enabled: true
  web_fetch:
    enabled: true
  web_search:
    # enabled: true
    # api_key:
    # api_secret:
    # app_id:
    # host: "cbm-search-api.cn-huabei-1.xf-yun.com"
    # path: "/biz/search"
    # limit: 5

  tavily_search:
    enabled: false
    api_key: ""          # set via CLAUDE_TOOLS_TAVILY_SEARCH_API_KEY or config_self.yaml
    # max_results: 5

# --- Skills ---
# Skills are loaded from the directories listed below, in order.
# Earlier directories have higher priority on name conflicts.
# Each directory is scanned for:
#   - skill-name/SKILL.md  (directory format)
# Default: ~/.harnessclaw/workspace/skills/ (when dirs is null or empty)
skills:
  dirs:
    # - "~/.harnessclaw/workspace/skills/"

# --- Console Management API ---
console:
  enabled: true
  host: "0.0.0.0"
  port: 8090

# --- Permission ---
permission:
  mode: "default"        # default, plan, bypass, acceptEdits, dontAsk
  allowed_tools: []
  denied_tools: []
