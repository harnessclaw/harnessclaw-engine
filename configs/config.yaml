# =============================================================================
# HarnessClaw Engine — Configuration
# =============================================================================

# --- Server ---
server:
  host: "0.0.0.0"
  port: 8080

# --- Logging ---
log:
  level: "info"          # debug, info, warn, error
  format: "console"      # json, console
  output: "stdout"       # stdout, file
  # file_path: "/var/log/harnessclaw-engine/service.log"

# --- LLM Provider (all providers are routed through Bifrost SDK) ---
llm:
  default_provider: "anthropic"              # Switch to "openai" to use OpenAI
  max_retries: 3
  api_timeout: "900s"
  # First-byte watchdog: max wait between Chat() returning and the first
  # stream chunk. Disarms once any chunk arrives, so legitimate slow
  # streams aren't penalised — only catches "gateway accepted the
  # request but never sent a byte" (the 10-min orphan-timeout
  # pathology). Tune up to 180s+ if upstream models commonly take
  # 60-90s to start streaming.
  first_byte_timeout: "120s"
  # proxy_url: "http://proxy:8888"
  # custom_headers:
  #   X-Custom: "value"
  providers:
    # 每个 provider 必须声明 `type`，决定 bifrost 用哪个后端协议对接。
    # 允许的 type 值：openai / anthropic / gemini / azure / bedrock / cohere /
    #                vertex / mistral / ollama / groq / openrouter / perplexity /
    #                cerebras / huggingface
    # OpenAI-compatible 厂商 (DeepSeek / Kimi / GLM / MiniMax 等) 用 type=openai
    # 加各自的 base_url 即可。yaml key 是任意"档位名"，可以重复使用同一个 type
    # 比如 claude-45 / claude-46 都 type=anthropic 但 model 不同。
    anthropic:
      type: anthropic
      base_url: "your-api-url"
      api_key: "your-api-key-here"
      model: "your-model-id"
      max_tokens: 16384
#    kimi:
#      type: openai
#      base_url: "https://api.moonshot.cn/v1"
#      api_key: "your-moonshot-key"
#      model: "kimi-k2"
#      max_tokens: 8192
#    deepseek:
#      type: openai
#      base_url: "https://api.deepseek.com"
#      api_key: "your-deepseek-key"
#      model: "deepseek-v4-flash"
#      max_tokens: 100000
#    glm:
#      type: openai
#      base_url: "https://open.bigmodel.cn/api/paas/v4"
#      api_key: "your-zhipu-key"
#      model: "glm-4"
#      max_tokens: 8192
#    # 同一后端不同 model — yaml key 任意，type 都 = anthropic
#    claude-45:
#      type: anthropic
#      base_url: "https://api.anthropic.com"
#      api_key: "sk-ant-..."
#      model: "claude-sonnet-4-5"
#      max_tokens: 16384
#    claude-46:
#      type: anthropic
#      base_url: "https://api.anthropic.com"
#      api_key: "sk-ant-..."
#      model: "claude-sonnet-4-6"
#      max_tokens: 16384
#    gemini-2:
#      type: gemini
#      base_url: "https://generativelanguage.googleapis.com/v1beta"
#      api_key: "..."
#      model: "gemini-2.0-pro"
#      max_tokens: 8192
#    openai:
#      type: openai
#      base_url: "https://api.openai.com"
#      api_key: "your-openai-api-key"
