# =============================================================================
# HarnessClaw Engine — Configuration
# =============================================================================

# --- Server ---
server:
    host: "0.0.0.0"
    port: 8080
# --- Logging ---
log:
    level: "info" # debug, info, warn, error
    format: "console" # json, console
    output: "stdout" # stdout, file
    # file_path: "/var/log/harnessclaw-engine/service.log"
# --- LLM (nested: providers (credentials) → endpoints (model bindings)) ---
llm:
    max_retries: 3
    api_timeout: "900s"
    # First-byte watchdog: max wait between Chat() returning and the first
    # stream chunk. Disarms once any chunk arrives.
    first_byte_timeout: "120s"
    # Default response cap inherited by endpoints that omit max_tokens.
    default_max_tokens: 8192
    # proxy_url: "http://proxy:8888"
    # custom_headers:
    #   X-Custom: "value"

    # ---------------------------------------------------------------------------
    # 一层: providers — 厂商凭证 (一个厂商一组 key + base_url)
    # ---------------------------------------------------------------------------
    # 每个 provider entry = 一组 API 凭证, 可被多个 endpoint 复用。
    # 改 api_key 一次, 所有 endpoint 自动用新凭证 (PATCH /api/v1/providers/{p}
    # 触发热生效)。
    #
    # 字段:
    #   type:      bifrost 后端协议。允许值: openai / anthropic
    #   base_url:  凭证对应的 HTTP endpoint
    #   api_key:   凭证
    #   endpoints: 嵌套的 endpoint map (每个绑一个 model)
    #
    # OpenAI-compatible 厂商 (DeepSeek / Kimi / GLM / MiniMax / 讯飞 / 通义)
    # 都用 type=openai, 改 base_url 区分。
    providers:
        anthropic:
            endpoints:
                # 同一组凭证下挂多个 endpoint, 每个绑一个 model
                claude-46:
                    model: claude-sonnet-4-6
                    max_tokens: 16384
                claude-45:
                    model: claude-sonnet-4-5
                    max_tokens: 16384
                claude-haiku:
                    model: claude-3-5-haiku
                    # max_tokens 省略时继承 default_max_tokens (8192)
                    # group 为可选自由文本，仅供客户端模型列表分组渲染用；
                    # 引擎不参与路由/failover，留空 = 未分组。
                    # group: "Claude-3"
                claude-sonnet-4-6:
                    model: claude-sonnet-4-6
                    max_tokens: 8192
                    model_type:
                        - vision
                        - reasoning
                        - tools
                    group: claude4.6
            type: anthropic
            base_url: http://one.iflytek.com/api/llm/console/chat
            api_key: "" # 通过 configs/config_self.yaml 或环境变量注入，不要提交真实凭证
        deepseek:
            type: openai
            base_url: https://api.deepseek.com
            api_key: "" # 通过 configs/config_self.yaml 或环境变量注入，不要提交真实凭证
            #    deepseek:
            #      type: openai
            #      base_url: "https://api.deepseek.com"
            #      api_key: "your-deepseek-key"
            #      endpoints:
            #        deepseek-flash:
            #          model: deepseek-v4-flash
            #          max_tokens: 100000
            #          enable_thinking: false   # DeepSeek 思考模式关掉省 token
            #        deepseek-reasoner:
            #          model: deepseek-reasoner
            #          max_tokens: 32768
            #          enable_thinking: true

            endpoints:
                deepseek-v4-pro:
                    model: deepseek-v4-pro
                    max_tokens: 8192
                    group: deepseek-v4
#    kimi:
#      type: openai
#      base_url: "https://api.moonshot.cn/v1"
#      api_key: "your-moonshot-key"
#      endpoints:
#        kimi-k2:
#          model: kimi-k2

#    glm:
#      type: openai
#      base_url: "https://open.bigmodel.cn/api/paas/v4"
#      api_key: "your-zhipu-key"
#      endpoints:
#        glm-4:
#          model: glm-4-plus

#    openai-official:
#      type: openai
#      base_url: "https://api.openai.com"
#      api_key: "sk-openai-xxx"
#      endpoints:
#        gpt-5:
#          model: gpt-5-turbo
