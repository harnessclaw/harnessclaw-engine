# ---------------------------------------------------------------------------
# Health: Failover 健康检查与降级行为调优 (全部可省略, 用默认值)
# ---------------------------------------------------------------------------
# health:
#   cooldown_base:    "30s"     # 首次 trip 的冷却
#   cooldown_max:     "10m"     # 冷却上限
#   cooldown_factor:  2          # 连续 trip 的冷却倍率
#   primary_budget:        "15s"  # Fast — 主 healthy 时 (有备可切, 激进快切)
#   last_healthy_budget:   "30s"  # Medium — 最后一个 healthy 或 Tier 3 兜底
#   probe_budget:          "5s"   # Probe — 探活 (冷却已过的 trip endpoint)
#
# 设计要点:
#   - "主 budget 15s" 是 Failover 层面给主的调用上限——超过 15s 视为失败、
#     切到备。LLM 正常请求首字节 1-5s, 15s 给单次抖动留了余量; 如果主总是
#     慢, 把 primary_budget 调到 30s 或更大。
#   - 单 endpoint 部署 (agent.primary 设, fallback_chain 留空) 也走这套但
#     直接进 retry 路径, 失败即上抛, 等价于现有 retry。
#   - 健康状态全部通过真实请求驱动 (被动); 没有后台拨测, 零额外 token。

# ---------------------------------------------------------------------------
# Agent — 整个 agent 应用的 LLM 路由 + 共享调用参数
# ---------------------------------------------------------------------------
# 引用 endpoint 用 "provider:endpoint" 字符串 (canonical 分隔符 ':')。
# primary = 主模型 (单 endpoint), fallback_chain = 备模型 (按顺序降级)。
# 旧格式 "provider.endpoint" 仍兼容 (解析时 fallback 用第一个 '.')。
#
# 为什么用 ':' 而不是 '.':endpoint name 可能本身就含 '.'(例如 model 名
# gpt-5.5 / claude-3.5-sonnet),用 ':' 避开歧义;新写的 yaml 一律用 ':'。
#
# 工作机制: 请求按 [primary, ...fallback_chain] 顺序尝试。某 endpoint
# 返回可降级错误 (429/5xx/529/网络抖动/连续 529/网关首字节超时/401/403)
# 时, trip 该 endpoint 并 route 到下一个。冷却到期后下一次请求把 tripped
# endpoint 作为探活 (Probe budget=5s); 探活成功 → 恢复; 失败 → 冷却指数翻倍。
#
# 不会触发降级的错误: prompt_too_long / max_output_tokens / ctx.Canceled。
#
# primary 和 fallback_chain 都留空 → 进入降级模式 (Chat 调用直接返回
# ErrNoEndpoint, 管理 API 可用); 通过 PATCH /api/v1/agent 修复。
#
# max_tokens / temperature / context_window 是 agent 层的默认值,会被烘进每个
# adapter 作为"请求字段为 0 时的兜底值"(改动会触发 adapter 重建)。
#
# temperature 统一用 [0, 1] 区间,框架按 provider type 缩放:
#   anthropic ×1.0  (原生 [0, 1])
#   openai    ×2.0  (原生 [0, 2])
#   gemini    ×2.0  (原生 [0, 2])
# 例:agent.temperature=0.5 → anthropic endpoint 用 0.5,openai endpoint 用 1.0。
#
# max_tokens 取 min(agent.max_tokens, endpoint.max_tokens)(endpoint 是硬上限);
# agent 为 0 时用 endpoint 自身值。
#
# context_window 是 engine compactor 的触发阈值分母 — 累计 message tokens 超过
# context_window × engine.auto_compact_threshold (默认 0.8) 时自动 compact。
# agent.context_window 为 0 → engine 用 200_000 兜底(claude 4.x / gpt-5 /
# gemini 2.x 主流上下文窗口)。
#
# 行为限制(agent 维度,非 endpoint):
#   max_turns          — 单次请求最多 LLM 轮次(必须 ≥ 1,默认 50)。原 engine.max_turns
#   max_tool_calls     — 单次请求累计工具调用次数上限(0 = 不限,只受 max_turns 制约)
#   thinking_intensity — 推理强度三档:low / medium / high(或空 = 不下发,沿用
#                        endpoint.enable_thinking)。adapter 按 provider 翻译:
#                        OpenAI o-series → reasoning_effort;Anthropic → 推理 token 预算;
#                        DeepSeek → enable_thinking
agent:
    primary: anthropic:claude-sonnet-4-6
    max_turns: 50
    image_generation: ""        # 选定的图片生成 endpoint，格式 "provider:endpoint"（空 = 关闭图片工具）
    video_generation: ""        # 选定的视频生成 endpoint，格式 "provider:endpoint"（空 = 关闭视频工具）
#  max_tool_calls: 0          # 0 = 不限
#  thinking_intensity: "medium"

# --- Image Generation ---
# 图片生成 provider 配置（独立子系统，OpenAI 兼容同步 API）。api_key 留空（放到
# config_self.yaml 或环境变量），在 Settings → 模型 → 图片生成模型 里填写。
# path 留空则用 provider 默认 /v1/images/generations；非 OpenAI 厂商（如豆包 Seedream）
# 按其文档填 base_url + path。
imagegen:
    providers:
        openai:
            api_key: ""
            base_url: https://api.openai.com
            path: /v1/images/generations
            endpoints:
                gpt-image:
                    model: gpt-image-1
        volcengine:                                              # 火山引擎（火山方舟 Ark / Seedream 图片）
            api_key: ""                                          # 火山方舟 Bearer token
            base_url: https://ark.cn-beijing.volces.com/api/v3
            path: /images/generations
            endpoints:
                seedream:
                    model: doubao-seedream-3-0-t2i-250415

# --- Video Generation ---
# 视频生成 provider 配置。api_key 留空（请放到 config_self.yaml 或环境变量），
# 在 Settings → 视频生成模型 里填写。base_url 留空则用 provider 内置默认值。
videogen:
    providers:
        volcengine:                                              # 火山引擎（火山方舟 Ark / Seedance 视频）
            api_key: ""                                          # 火山方舟 Bearer token
            base_url: https://ark.cn-beijing.volces.com/api/v3
            endpoints:
                seedance-lite-i2v:
                    model: doubao-seedance-1-0-lite-i2v-250428

# --- Query Engine ---
engine:
    auto_compact_threshold: 0.8
    tool_timeout: "120s"
# --- Session ---
session:
    max_messages: 200
    idle_timeout: "30m"
# --- Channels ---
channels:
    websocket:
        enabled: true
        host: "0.0.0.0"
        port: 8081
        path: "/v1/ws"
        write_buffer: 256
        ping_interval: "30s"
        write_timeout: "10s"
        max_message_size: 524288 # 512KB
        # client_tools sets the DEFAULT routing for tools that don't opt in
        # to a specific side. Per-tool overrides (e.g. AskUserQuestion always
        # client, regardless of this flag) take precedence — see
        # internal/tool.ClientRoutedTool.
        #
        #   true  — delegate-everything mode (Claude Code CLI style: client
        #           runs Bash/Edit/Read/etc.). Pick this when your client
        #           knows how to execute every registered tool.
        #   false — server-runs-everything mode (web UI style: server has API
        #           keys for WebSearch, spawns sub-agents, etc.). The client
        #           still receives tool.call for tools marked client-routed
        #           (AskUserQuestion). This is the right setting for emma's
        #           web UI.
        client_tools: false
        # trace_frames toggles a per-outgoing-frame INFO log line capturing
        # type / card_kind / card_id / parent / seq / status / error. Off in
        # production (this flag generates one line per wire frame — 80-200
        # per plan run); flip on while debugging "step never closes" /
        # "card lineage wrong" UI issues, then grep "ws send" service.log.
        trace_frames: false
    http:
        enabled: true
        host: "0.0.0.0"
        port: 8080
        path: "/api/v1"
    feishu:
        enabled: false
        host: "0.0.0.0"
        port: 8082
        # app_id: ""
        # app_secret: ""
# --- Tools ---
tools:
    bash:
        enabled: true
        timeout: "60s"
        sandbox: false
    file_read:
        enabled: true
    file_edit:
        enabled: true
    file_write:
        enabled: true
    grep:
        enabled: true
    glob:
        enabled: true
    web_fetch:
        enabled: true
    web_search:
    # enabled: true
    # api_key: ""    # iFly v2/search APIPassword — get from https://console.xfyun.cn/services/aggSearch
    # limit: 5
    tavily_search:
        enabled: false
        api_key: "" # set via CLAUDE_TOOLS_TAVILY_SEARCH_API_KEY or config_self.yaml
        # max_results: 5
    browser_agent:
        enabled: true
        default_visibility: "hidden"
        max_steps: 30
        blocked_domains: []
        human_takeover_timeout: "120s"
        session_persistence: true
        cli_timeout: "25s"
        skill_max_bytes: 200000
        content_boundaries: true
        max_output_bytes: 50000
        allowed_domains: []
        action_policy_path: ""
        confirm_actions: []
# --- Agents ---
# Project-level agent definitions loaded from YAML files at startup.
# YAML is authoritative: edits take effect on next restart (no recompile).
# Each directory is scanned for *.yaml / *.yml agent definition files.
agents:
    dirs:
        - "configs/agents"
# --- Skills ---
# Skills are loaded from the directories listed below, in order.
# Earlier directories have higher priority on name conflicts.
# Each directory is scanned for:
#   - skill-name/SKILL.md  (directory format)
# Default: ~/.harnessclaw/workspace/skills/ (when dirs is null or empty)
skills:
    dirs:
    # - "~/.harnessclaw/workspace/skills/"
# --- Console Management API ---
console:
    enabled: true
    host: "0.0.0.0"
    port: 8090
# --- Permission ---
permission:
    mode: "default" # default, plan, bypass, acceptEdits, dontAsk
    allowed_tools: []
    denied_tools: []
